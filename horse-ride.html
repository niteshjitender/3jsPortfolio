<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horse Ride Terrain Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(14, 20, 24, 0.72);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text: #f7fbf4;
      --muted: #b9c8b6;
      --amber: #f3c35b;
      --green: #8fc17a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #91bad8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(78px, 1fr));
      gap: 8px;
      width: min(360px, calc(100vw - 36px));
      pointer-events: none;
      z-index: 3;
    }

    .hud-cell,
    .loading,
    .title-strip {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 36px rgba(9, 18, 14, 0.22);
    }

    .hud-cell {
      min-height: 72px;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .hud-cell span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hud-cell strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(1.12rem, 3vw, 1.62rem);
      line-height: 1;
    }

    .hud-cell small {
      display: block;
      margin-top: 5px;
      color: rgba(247, 251, 244, 0.66);
      font-size: 0.7rem;
    }

    .title-strip {
      position: fixed;
      right: 18px;
      top: 18px;
      max-width: min(310px, calc(100vw - 36px));
      border-radius: 8px;
      padding: 12px 14px;
      pointer-events: none;
      z-index: 3;
    }

    .title-strip h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.1;
    }

    .title-strip p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .loading {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.88rem;
      z-index: 4;
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .loading.is-hidden {
      opacity: 0;
      transform: translate(-50%, 12px);
    }

    .touch-controls {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: none;
      grid-template-columns: repeat(3, 54px);
      grid-template-rows: repeat(2, 54px);
      gap: 8px;
      z-index: 5;
    }

    .touch-controls button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(17, 24, 22, 0.72);
      color: #f7fbf4;
      font-size: 1.1rem;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      touch-action: manipulation;
    }

    .touch-controls button:active {
      background: rgba(143, 193, 122, 0.82);
      color: #101811;
    }

    .touch-up {
      grid-column: 2;
      grid-row: 1;
    }

    .touch-left {
      grid-column: 1;
      grid-row: 2;
    }

    .touch-down {
      grid-column: 2;
      grid-row: 2;
    }

    .touch-right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (max-width: 720px), (pointer: coarse) {
      .hud {
        grid-template-columns: repeat(3, 1fr);
        top: 12px;
        left: 12px;
        width: calc(100vw - 24px);
      }

      .hud-cell {
        min-height: 60px;
        padding: 8px 9px;
      }

      .title-strip {
        display: none;
      }

      .touch-controls {
        display: grid;
      }
    }
  </style>
</head>

<body>
  <canvas id="ride-canvas" aria-label="Horse riding terrain"></canvas>

  <aside class="hud" aria-label="Ride state">
    <div class="hud-cell">
      <span>Speed</span>
      <strong id="speed-readout">0</strong>
      <small>km/h</small>
    </div>
    <div class="hud-cell">
      <span>Gait</span>
      <strong id="gait-readout">Idle</strong>
      <small id="terrain-readout">level</small>
    </div>
    <div class="hud-cell">
      <span>Turn</span>
      <strong id="turn-readout">Center</strong>
      <small>head follows</small>
    </div>
  </aside>

  <section class="title-strip" aria-label="Demo title">
    <h1>Horse Ride</h1>
    <p>Bumpy terrain, canter bob, and horse head movement react together in real time.</p>
  </section>

  <div class="loading" id="loading-status">Loading horse model...</div>

  <div class="touch-controls" aria-label="Touch ride controls">
    <button class="touch-up" type="button" data-key="ArrowUp" aria-label="Move forward">W</button>
    <button class="touch-left" type="button" data-key="ArrowLeft" aria-label="Turn left">A</button>
    <button class="touch-down" type="button" data-key="ArrowDown" aria-label="Slow down">S</button>
    <button class="touch-right" type="button" data-key="ArrowRight" aria-label="Turn right">D</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('ride-canvas');
    const speedReadout = document.getElementById('speed-readout');
    const gaitReadout = document.getElementById('gait-readout');
    const terrainReadout = document.getElementById('terrain-readout');
    const turnReadout = document.getElementById('turn-readout');
    const loadingStatus = document.getElementById('loading-status');
    const embeddedHorseGlbElement = document.getElementById('embedded-horse-glb');

    const debugState = {
      horseLoaded: false,
      speed: 0,
      steer: 0,
      terrain: 'level',
      position: { x: 0, z: 120 }
    };
    window.__horseRideState = debugState;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x94bdd7);
    scene.fog = new THREE.Fog(0x94bdd7, 85, 620);

    const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 950);
    const cameraRig = new THREE.Group();
    scene.add(cameraRig);
    cameraRig.add(camera);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: 'high-performance'
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const hemisphere = new THREE.HemisphereLight(0xe9f7ff, 0x3f5031, 1.9);
    scene.add(hemisphere);

    const sun = new THREE.DirectionalLight(0xffdf9a, 2.2);
    sun.position.set(-170, 240, 120);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 540;
    sun.shadow.camera.left = -250;
    sun.shadow.camera.right = 250;
    sun.shadow.camera.top = 250;
    sun.shadow.camera.bottom = -250;
    scene.add(sun);

    const terrainSize = 1600;
    const terrainHalf = terrainSize / 2;
    const maxSpeed = 13.5;
    const rider = {
      position: new THREE.Vector3(0, 0, 120),
      yaw: 0,
      speed: 0,
      steer: 0,
      phase: 0,
      smoothedHeight: 0
    };

    const controls = new Map();
    const clock = new THREE.Clock();
    let horseMixer = null;
    const horsePivot = new THREE.Group();
    const horseModel = new THREE.Group();
    const reins = new THREE.Group();
    camera.add(horsePivot);
    camera.add(reins);
    horsePivot.add(horseModel);

    buildTerrain();
    buildRocksAndGrass();
    loadHorse();
    bindControls();
    window.addEventListener('resize', handleResize);

    animate();

    function buildTerrain() {
      const geometry = new THREE.PlaneGeometry(terrainSize, terrainSize, 220, 220);
      geometry.rotateX(-Math.PI / 2);

      const position = geometry.attributes.position;
      const colors = [];
      const low = new THREE.Color(0x657d42);
      const mid = new THREE.Color(0x8eb76b);
      const high = new THREE.Color(0xc8b376);
      const stone = new THREE.Color(0xa4a399);
      const color = new THREE.Color();

      for (let i = 0; i < position.count; i += 1) {
        const x = position.getX(i);
        const z = position.getZ(i);
        const height = terrainHeight(x, z);
        position.setY(i, height);

        const lift = THREE.MathUtils.clamp((height + 18) / 42, 0, 1);
        if (lift < 0.46) {
          color.copy(low).lerp(mid, lift / 0.46);
        } else if (lift < 0.82) {
          color.copy(mid).lerp(high, (lift - 0.46) / 0.36);
        } else {
          color.copy(high).lerp(stone, (lift - 0.82) / 0.18);
        }

        const trail = Math.exp(-Math.abs(x + Math.sin(z * 0.01) * 42) / 28);
        color.lerp(new THREE.Color(0x9c7c55), trail * 0.42);
        colors.push(color.r, color.g, color.b);
      }

      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.computeVertexNormals();

      const material = new THREE.MeshStandardMaterial({
        vertexColors: true,
        roughness: 0.98,
        metalness: 0,
        side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    function buildRocksAndGrass() {
      const rand = seededRandom(74);
      const rockMaterial = new THREE.MeshStandardMaterial({
        color: 0x7c8075,
        roughness: 0.92
      });
      const trunkMaterial = new THREE.MeshStandardMaterial({
        color: 0x4b3b2a,
        roughness: 0.95
      });
      const leafMaterial = new THREE.MeshStandardMaterial({
        color: 0x436c3b,
        roughness: 0.9
      });

      const rockGeometry = new THREE.DodecahedronGeometry(1, 0);
      const trunkGeometry = new THREE.CylinderGeometry(0.16, 0.26, 2.2, 7);
      const leafGeometry = new THREE.ConeGeometry(1.25, 3.2, 8);

      for (let i = 0; i < 95; i += 1) {
        const x = (rand() - 0.5) * terrainSize * 0.9;
        const z = (rand() - 0.5) * terrainSize * 0.9;
        if (Math.abs(x) < 38 && z > -280 && z < 280) {
          continue;
        }

        const rock = new THREE.Mesh(rockGeometry, rockMaterial);
        const scale = 0.8 + rand() * 3.4;
        rock.scale.set(scale * (0.7 + rand()), scale * 0.55, scale * (0.7 + rand()));
        rock.position.set(x, terrainHeight(x, z) + scale * 0.22, z);
        rock.rotation.set(rand() * Math.PI, rand() * Math.PI, rand() * Math.PI);
        rock.castShadow = true;
        rock.receiveShadow = true;
        scene.add(rock);
      }

      for (let i = 0; i < 120; i += 1) {
        const x = (rand() - 0.5) * terrainSize * 0.92;
        const z = (rand() - 0.5) * terrainSize * 0.92;
        if (Math.abs(x) < 70 && z > -360 && z < 360) {
          continue;
        }

        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
        const leaves = new THREE.Mesh(leafGeometry, leafMaterial);
        const scale = 1.1 + rand() * 2.3;
        trunk.position.y = 1.1 * scale;
        leaves.position.y = 3.1 * scale;
        trunk.scale.setScalar(scale);
        leaves.scale.setScalar(scale);
        trunk.castShadow = true;
        leaves.castShadow = true;
        tree.add(trunk, leaves);
        tree.position.set(x, terrainHeight(x, z), z);
        tree.rotation.y = rand() * Math.PI * 2;
        scene.add(tree);
      }
    }

    function buildReins() {
      const reinMaterial = new THREE.MeshStandardMaterial({
        color: 0x201712,
        roughness: 0.7
      });

      [-1, 1].forEach((side) => {
        const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(side * 0.32, -0.84, -0.58),
        new THREE.Vector3(side * 0.48, -1.08, -1.65),
          new THREE.Vector3(side * 0.34, -0.94, -3.05),
          new THREE.Vector3(side * 0.18, -0.76, -4.08)
        ]);
        const geometry = new THREE.TubeGeometry(curve, 42, 0.012, 8, false);
        const rein = new THREE.Mesh(geometry, reinMaterial);
        reins.add(rein);
      });
    }

    function loadHorse() {
      const loader = new GLTFLoader();
      const finishLoadedHorse = (gltf) => {
        const object = gltf.scene;
        object.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.roughness = Math.min(child.material.roughness ?? 0.9, 0.95);
            }
          }
        });

        const box = new THREE.Box3().setFromObject(object);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);
        object.position.sub(center);

        const targetLength = 5.2;
        const scale = targetLength / Math.max(size.x, size.y, size.z, 1);
        object.scale.setScalar(scale);
        object.rotation.set(0, Math.PI, 0);
        object.position.z -= 0.2;
        object.position.y -= 0.72;

        const forwardGroup = new THREE.Group();
        forwardGroup.rotation.y = Math.PI / 2;
        forwardGroup.add(object);
        horseModel.add(forwardGroup);

        if (gltf.animations.length) {
          horseMixer = new THREE.AnimationMixer(object);
          gltf.animations.forEach((clip) => {
            horseMixer.clipAction(clip).play();
          });
        }

        debugState.horseLoaded = true;
        hideLoading('Rigged horse ready');
      }

      const riggedHorseUrl = embeddedHorseGlbElement?.textContent.trim() || 'assets/horse/animated_rigged_horse_with_saddle.glb';

      loader.load(
        riggedHorseUrl,
        finishLoadedHorse,
        (xhr) => {
          if (xhr.total) {
            const loaded = Math.round((xhr.loaded / xhr.total) * 100);
            loadingStatus.textContent = `Loading rigged horse ${loaded}%`;
          }
        },
        (error) => {
          loadingStatus.textContent = getHorseLoadErrorMessage();
          loadingStatus.classList.remove('is-hidden');
          console.error('Rigged horse GLB failed to load:', error);
          debugState.horseLoaded = false;
        }
      );
    }

    function bindControls() {
      window.addEventListener('keydown', (event) => {
        if (isRideKey(event.key)) {
          event.preventDefault();
          setControl(normalizeKey(event.key), true);
        }
      }, { passive: false });

      window.addEventListener('keyup', (event) => {
        if (isRideKey(event.key)) {
          event.preventDefault();
          setControl(normalizeKey(event.key), false);
        }
      }, { passive: false });

      window.addEventListener('blur', () => controls.clear());

      document.querySelectorAll('[data-key]').forEach((button) => {
        const key = button.dataset.key;
        const press = (event) => {
          event.preventDefault();
          setControl(key, true);
        };
        const release = (event) => {
          event.preventDefault();
          setControl(key, false);
        };
        button.addEventListener('pointerdown', press);
        button.addEventListener('pointerup', release);
        button.addEventListener('pointercancel', release);
        button.addEventListener('pointerleave', release);
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      updateRide(dt);
      if (horseMixer) {
        const animationRate = 0.35 + THREE.MathUtils.clamp(Math.abs(rider.speed) / maxSpeed, 0, 1) * 1.35;
        horseMixer.update(dt * animationRate);
      }
      renderer.render(scene, camera);
    }

    function updateRide(dt) {
      const forwardInput = isControlActive('ArrowUp') ? 1 : 0;
      const backInput = isControlActive('ArrowDown') ? 1 : 0;
      const leftInput = isControlActive('ArrowLeft') ? 1 : 0;
      const rightInput = isControlActive('ArrowRight') ? 1 : 0;
      const steerTarget = leftInput - rightInput;

      rider.steer = damp(rider.steer, steerTarget, 8.5, dt);

      if (forwardInput) {
        rider.speed += 12 * dt;
      }
      if (backInput) {
        rider.speed -= 14 * dt;
      }
      if (!forwardInput && !backInput) {
        rider.speed = damp(rider.speed, 0, 0.68, dt);
      }
      rider.speed = THREE.MathUtils.clamp(rider.speed, -5, maxSpeed);

      const speed01 = THREE.MathUtils.clamp(Math.abs(rider.speed) / maxSpeed, 0, 1);
      const steeringPower = 0.42 + speed01 * 0.88;
      const speedDirection = rider.speed >= -0.05 ? 1 : -0.7;
      rider.yaw += rider.steer * steeringPower * speedDirection * dt;

      const forward = new THREE.Vector3(-Math.sin(rider.yaw), 0, -Math.cos(rider.yaw));
      rider.position.addScaledVector(forward, rider.speed * dt);
      rider.position.x = THREE.MathUtils.clamp(rider.position.x, -terrainHalf + 42, terrainHalf - 42);
      rider.position.z = THREE.MathUtils.clamp(rider.position.z, -terrainHalf + 42, terrainHalf - 42);

      const height = terrainHeight(rider.position.x, rider.position.z);
      rider.smoothedHeight = damp(rider.smoothedHeight, height, 8.2, dt);
      rider.phase += (2.35 + speed01 * 9.2) * dt;

      const bob = Math.sin(rider.phase) * (0.06 + speed01 * 0.16);
      const gallop = Math.sin(rider.phase * 2.04) * speed01 * 0.055;
      const sideSway = Math.sin(rider.phase * 0.5) * speed01 * 0.03;

      const sampleDistance = 5.5;
      const ahead = terrainHeight(
        rider.position.x + forward.x * sampleDistance,
        rider.position.z + forward.z * sampleDistance
      );
      const behind = terrainHeight(
        rider.position.x - forward.x * sampleDistance,
        rider.position.z - forward.z * sampleDistance
      );
      const side = new THREE.Vector3(-forward.z, 0, forward.x);
      const leftHeight = terrainHeight(
        rider.position.x + side.x * sampleDistance,
        rider.position.z + side.z * sampleDistance
      );
      const rightHeight = terrainHeight(
        rider.position.x - side.x * sampleDistance,
        rider.position.z - side.z * sampleDistance
      );

      const pitch = THREE.MathUtils.clamp(Math.atan2(ahead - behind, sampleDistance * 2) * 0.35, -0.14, 0.14);
      const roll = THREE.MathUtils.clamp(Math.atan2(leftHeight - rightHeight, sampleDistance * 2) * 0.34, -0.12, 0.12);
      const terrainLabel = Math.abs(ahead - behind) + Math.abs(leftHeight - rightHeight) > 2.2 ? 'bumpy' : 'level';

      cameraRig.position.set(rider.position.x, rider.smoothedHeight + 3.05 + bob + gallop, rider.position.z);
      cameraRig.rotation.y = rider.yaw;
      camera.position.set(sideSway, 0, 0);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = -0.05 + pitch + Math.sin(rider.phase * 0.62) * speed01 * 0.018;
      camera.rotation.y = rider.steer * 0.035;
      camera.rotation.z = -rider.steer * 0.075 - roll;

      horsePivot.position.set(0, -2.35 + Math.sin(rider.phase * 2.05) * speed01 * 0.045, -3.65 - speed01 * 0.32);
      horsePivot.rotation.order = 'YXZ';
      horsePivot.rotation.y = -rider.steer * 0.52 + Math.sin(rider.phase * 0.42) * speed01 * 0.025;
      horsePivot.rotation.x = 0.08 + Math.sin(rider.phase * 1.86) * (0.035 + speed01 * 0.075);
      horsePivot.rotation.z = -rider.steer * 0.14 + Math.sin(rider.phase) * speed01 * 0.02;

      reins.rotation.z = -rider.steer * 0.05;
      reins.position.y = Math.sin(rider.phase * 2.05) * speed01 * 0.026;

      sun.target.position.set(rider.position.x, rider.smoothedHeight, rider.position.z);
      sun.target.updateMatrixWorld();

      updateHud(speed01, terrainLabel);
    }

    function updateHud(speed01, terrainLabel) {
      const kmh = Math.round(Math.abs(rider.speed) * 3.6);
      speedReadout.textContent = String(kmh);

      let gait = 'Idle';
      if (Math.abs(rider.speed) > 1.5 && speed01 < 0.32) {
        gait = 'Walk';
      } else if (speed01 >= 0.32 && speed01 < 0.68) {
        gait = 'Trot';
      } else if (speed01 >= 0.68) {
        gait = 'Canter';
      }
      gaitReadout.textContent = gait;
      terrainReadout.textContent = terrainLabel;

      if (rider.steer > 0.18) {
        turnReadout.textContent = 'Left';
      } else if (rider.steer < -0.18) {
        turnReadout.textContent = 'Right';
      } else {
        turnReadout.textContent = 'Center';
      }

      debugState.speed = rider.speed;
      debugState.steer = rider.steer;
      debugState.terrain = terrainLabel;
      debugState.position.x = rider.position.x;
      debugState.position.z = rider.position.z;
    }

    function terrainHeight(x, z) {
      const wide = Math.sin(x * 0.012 + z * 0.004) * 6.2;
      const rolling = Math.cos(z * 0.016 - x * 0.006) * 5.1;
      const small = Math.sin((x + z) * 0.045) * 1.8 + Math.cos((x - z) * 0.037) * 1.5;
      const ripple = Math.sin(Math.hypot(x + 210, z - 160) * 0.032) * 1.3;
      const trailSoftening = Math.exp(-Math.abs(x + Math.sin(z * 0.01) * 42) / 36);
      return (wide + rolling + small + ripple) * (1 - trailSoftening * 0.34);
    }

    function seededRandom(seed) {
      let value = seed;
      return () => {
        value = (value * 1664525 + 1013904223) % 4294967296;
        return value / 4294967296;
      };
    }

    function damp(value, target, smoothing, dt) {
      return THREE.MathUtils.lerp(value, target, 1 - Math.exp(-smoothing * dt));
    }

    function isRideKey(key) {
      return ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(key);
    }

    function normalizeKey(key) {
      const lower = key.toLowerCase();
      if (lower === 'w') {
        return 'ArrowUp';
      }
      if (lower === 's') {
        return 'ArrowDown';
      }
      if (lower === 'a') {
        return 'ArrowLeft';
      }
      if (lower === 'd') {
        return 'ArrowRight';
      }
      return key;
    }

    function setControl(key, held) {
      controls.set(key, {
        held,
        until: performance.now() + (held ? 160 : 130)
      });
    }

    function isControlActive(key) {
      const control = controls.get(key);
      if (!control) {
        return false;
      }
      if (control.held || control.until > performance.now()) {
        return true;
      }
      controls.delete(key);
      return false;
    }

    function hideLoading(message) {
      loadingStatus.textContent = message;
      window.setTimeout(() => {
        loadingStatus.classList.add('is-hidden');
      }, 650);
    }

    function getHorseLoadErrorMessage() {
      if (window.location.protocol === 'file:') {
        return 'Browser blocked the GLB because this page was opened as file://. Use http://localhost:8066/horse-ride.html';
      }

      return 'Rigged horse failed to load. Check assets/horse/animated_rigged_horse_with_saddle.glb and serve the page over http://localhost.';
    }

    function handleResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
  </script>
</body>

</html>
